<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Tab Cleaner — Settings</title>
  <style>
    :root {
      --color-primary: #0060df;
      --color-primary-hover: #0250bb;
      --color-primary-active: #003fab;
      --color-text: #15141a;
      --color-text-secondary: #5b5b66;
      --color-border: #cfcfd8;
      --color-bg: #f9f9fb;
      --color-surface: #ffffff;
      --color-success: #017a40;
      --color-success-bg: #dff4e8;
      --color-error: #c50042;
      --color-error-bg: #ffe8f0;
      --radius-sm: 4px;
      --radius-md: 8px;
      --shadow-card: 0 1px 4px rgba(21, 20, 26, 0.1);
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      color: var(--color-text);
      background: var(--color-bg);
      padding: 24px 16px 32px;
      min-width: 300px;
      max-width: 440px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    header img {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 17px;
      font-weight: 600;
      color: var(--color-text);
    }

    .card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-card);
      padding: 20px;
    }

    .setting-label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .setting-description {
      font-size: 13px;
      color: var(--color-text-secondary);
      margin-bottom: 12px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"] {
      width: 72px;
      padding: 7px 10px;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-family: inherit;
      color: var(--color-text);
      background: var(--color-surface);
      text-align: center;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      -webkit-appearance: none;
    }

    input[type="number"]:focus {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
      border-color: transparent;
    }

    .unit {
      font-size: 14px;
      color: var(--color-text-secondary);
    }

    .divider {
      border: none;
      border-top: 1px solid var(--color-border);
      margin: 20px 0;
    }

    .btn-save {
      width: 100%;
      padding: 10px 16px;
      background: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s ease;
    }

    .btn-save:hover {
      background: var(--color-primary-hover);
    }

    .btn-save:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    .btn-save:active {
      background: var(--color-primary-active);
    }

    #status {
      min-height: 32px;
      margin-top: 12px;
      padding: 5px 10px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    #status.visible {
      opacity: 1;
    }

    #status.saved {
      color: var(--color-success);
      background: var(--color-success-bg);
    }

    #status.error {
      color: var(--color-error);
      background: var(--color-error-bg);
    }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon.svg" alt="" aria-hidden="true" />
    <h1>New Tab Cleaner</h1>
  </header>

  <div class="card">
    <label class="setting-label" for="timeout">Idle timeout</label>
    <p class="setting-description">
      Automatically close a new tab that has not been visited within this time.
      <br />
      The currently displayed tab is never closed.
    </p>
    <div class="input-row">
      <input
        type="number"
        id="timeout"
        min="1"
        max="60"
        value="5"
        aria-describedby="timeout-unit"
      />
      <span class="unit" id="timeout-unit">minute(s)</span>
    </div>

    <hr class="divider" />

    <button class="btn-save" id="save" type="button">Save</button>
    <div id="status" role="status" aria-live="polite"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
